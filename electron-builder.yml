appId: do.linux.macos
productName: LinuxDO
copyright: Third-party client for linux.do

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json

# Ship the app; user-data (the persist:linuxdo partition) lives in the OS app-data dir.
asar: true

mac:
  category: public.app-category.social-networking
  darkModeSupport: true
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  # Local/unsigned build. For distribution, set your Apple Developer identity and
  # enable notarization (requires certs + an Apple ID).
  identity: null
  extendInfo:
    NSHumanReadableCopyright: Third-party client for linux.do
    # Register the discourse:// URL scheme for the (optional) User-API-Key deep-link flow.
    CFBundleURLTypes:
      - CFBundleURLName: do.linux.macos.auth
        CFBundleURLSchemes:
          - discourse

dmg:
  title: LinuxDO ${version}

publish: null
