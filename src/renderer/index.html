<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oh My LinuxDo</title>
    <script>
      // Anti-flash: resolve theme before first paint.
      (function () {
        try {
          var s = JSON.parse(localStorage.getItem('linuxdo-settings') || '{}')
          var t = s.theme || 'system'
          var dark = t === 'dark' || (t === 'system' && matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.dataset.theme = dark ? 'dark' : 'light'
          if (typeof s.fontScale === 'number') document.documentElement.style.fontSize = 16 * s.fontScale + 'px'
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
